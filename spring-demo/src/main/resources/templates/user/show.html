<!DOCTYPE html>
<html>

<head>
	<title>Manage User</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" th:href="@{css/style.css}">



</head>

<body>
	<div style="padding: 15px;">
		<div style="margin: 15px 0px; display: flex; justify-content: space-between; align-items: center;">
			<h3>Table Users</h3>
			<a href="/user/create" class="btn btn-primary">Create Users</a>
		</div>
		
		<table class="table table-bordered table-hover">
			<thead>
				<tr>
					<th scope="col">Id</th>
					<th scope="col">Name</th>
					<th scope="col">Email</th>
					<th scope="col">Address</th>
					<th scope="col">Thao tác</th>
				</tr>
			</thead>
			<tbody>
				
				<tr th:unless="${#lists.isEmpty(users)}" th:each="user: ${users}">
					<th th:text="${user.id}" class="text-center"></th>
					<td th:text="${user.name}"/>
					<td th:text="${user.email}"/>
					<td th:text="${user.address}"/>
					<td>
						<div class="actionblock text-center" >
							<!-- Nút Sửa -->
							<a th:href="@{/user/{id}(id=${user.id})}" class="btn btn-warning ">Sửa</a>

							<!-- Form Xóa -->
							<form th:action="@{/user/delete/{id}(id=${user.id})}" th:method="delete">
								<button type="submit"
								        class="btn btn-danger"
								        onclick="return confirm('Bạn có chắc chắn muốn xóa không?');">
									Xóa
								</button>
							</form>
						</div>
					</td>
				</tr>
				<tr th:if="${#lists.isEmpty(users)}">
					<td colspan="5" class="text-muted py-4">
						<i class="bi bi-inbox fs-4 d-block mb-2"></i> <!-- Icon hộp trống nếu dùng Bootstrap Icon -->
						Không có dữ liệu hiển thị.
					</td>
				</tr>
			</tbody>
		</table>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

</body>

</html>
